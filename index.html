<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Статусы · Нежный вайб</title>
  <style>
    :root {
      --bg: #fdfaff;
      --card: #ffffff;
      --text: #4a4a6a;
      --text-light: #7a7a9a;
      --accent: #d7c0ff;
      --shadow: 0 8px 32px rgba(180, 160, 255, 0.12);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #fdfaff 0%, #f8f0ff 100%);
      color: var(--text);
      margin: 0;
      padding: 32px 16px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h2 {
      margin: 2.2em 0 1.2em;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #b794f4, #9f7aea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #myInfo {
      background: var(--card);
      padding: 20px 24px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      font-size: 1.15rem;
      font-weight: 500;
      margin-bottom: 32px;
      border: 1px solid rgba(200, 180, 255, 0.18);
    }

    .status-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 24px 0 40px;
    }

    .status-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.28s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--btn-bg-start), var(--btn-bg-end));
      color: var(--btn-text);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .status-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 32px rgba(180, 160, 255, 0.22);
    }

    .status-btn:active { transform: translateY(-1px) scale(1.01); }

    .study   { --btn-bg-start: #e0f7fa; --btn-bg-end: #b2ebf2; --btn-text: #006064; }
    .coffee  { --btn-bg-start: #fff3e0; --btn-bg-end: #ffe0b2; --btn-text: #ef6c00; }
    .game    { --btn-bg-start: #e8f5e9; --btn-bg-end: #c8e6c9; --btn-text: #2e7d32; }
    .home    { --btn-bg-start: #f3e5f5; --btn-bg-end: #e1bee7; --btn-text: #6a1b9a; }

    #groupList {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-item {
      background: var(--card);
      padding: 18px 22px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(200, 180, 255, 0.12);
      transition: all 0.25s ease;
    }

    .user-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(180, 160, 255, 0.18);
    }

    .status-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--dot-color), color-mix(in srgb, var(--dot-color) 70%, white));
      box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.08),
        0 0 0 3px rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .username {
      font-weight: 650;
      color: var(--text);
      font-size: 1.1rem;
    }

    .status-text {
      color: var(--text-light);
      font-size: 0.98rem;
      margin-top: 3px;
    }

    .error {
      color: #d32f2f;
      background: #ffebee;
      padding: 14px;
      border-radius: 16px;
      font-size: 0.98rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Мой профиль</h2>
  <div id="myInfo">Загрузка нежного вайба...</div>

  <div class="status-buttons">
    <button class="status-btn study"   data-status="Учусь"  data-color="#80deea">📚 Учусь</button>
    <button class="status-btn coffee"  data-status="Кофе"  data-color="#ffcc80">☕ Кофе</button>
    <button class="status-btn game"    data-status="В игре" data-color="#a5d6a7">🎮 В игре</button>
    <button class="status-btn home"    data-status="Дома"   data-color="#ce93d8">🏠 Дома</button>
  </div>

  <h2>Монитор группы</h2>
  <div id="groupList">Собираем облачко участников...</div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const URL  = 'https://pxqmvgmicxxbkxcrthqz.supabase.co';
  const KEY  = 'sb_publishable_B7yD6pvugtqb9g9EZWNo8A_qsWbkpQY';
  const supabase = createClient(URL, KEY);
  const MY_ID = '0daffd62-b732-412d-acbb-13e0cb1e549f';

  async function changeStatus(text, color) {
    const { error } = await supabase
      .from('profiles')
      .update({ status: text })
      .eq('id', MY_ID);

    if (error) {
      console.error('Ошибка:', error);
      alert('Не получилось обновить статус 😔\nПроверь RLS в Supabase');
      return false;
    }
    return true;
  }

  async function fetchGroup() {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .order('username', { ascending: true });

    if (error) {
      console.error('Ошибка загрузки:', error);
      document.getElementById('groupList').innerHTML =
        '<div class="error">Не удалось загрузить участников 💔</div>';
      return;
    }

    const me = data.find(u => u.id === MY_ID);
    if (me) {
      document.getElementById('myInfo').textContent =
        `Ты здесь как: ${me.username} 🌸`;
    }

    document.getElementById('groupList').innerHTML = data
      .map(user => {
        const dotColor = user.color || '#e1bee7';
        const statusText = user.status || 'Пока без настроения';

        return `
          <div class="user-item">
            <div class="status-dot" style="--dot-color: ${dotColor}"></div>
            <div>
              <div class="username">${user.username}</div>
              <div class="status-text">${statusText}</div>
            </div>
          </div>
        `;
      })
      .join('');
  }

  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const text  = btn.dataset.status;
      const color = btn.dataset.color;
      if (await changeStatus(text, color)) {
        fetchGroup();
      }
    });
  });

  fetchGroup();
  setInterval(fetchGroup, 6000); // чуть реже, чтобы не нагружать
</script>
</body>
</html>
